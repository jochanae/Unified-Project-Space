<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Coin base -->
  <circle cx="16" cy="16" r="14" fill="url(#coinGradient)" stroke="#d97706" stroke-width="1.5"/>
  
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  
  <!-- Bloom/flower in center -->
  <g transform="translate(16, 16)">
    <!-- Petals -->
    <ellipse cx="0" cy="-5" rx="2.5" ry="4" fill="#10b981" opacity="0.9"/>
    <ellipse cx="4.5" cy="-2.5" rx="2.5" ry="4" fill="#34d399" opacity="0.85" transform="rotate(72)"/>
    <ellipse cx="3" cy="4" rx="2.5" ry="4" fill="#10b981" opacity="0.9" transform="rotate(144)"/>
    <ellipse cx="-3" cy="4" rx="2.5" ry="4" fill="#34d399" opacity="0.85" transform="rotate(216)"/>
    <ellipse cx="-4.5" cy="-2.5" rx="2.5" ry="4" fill="#10b981" opacity="0.9" transform="rotate(288)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="2.5" fill="#fbbf24"/>
  </g>
  
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
</svg>