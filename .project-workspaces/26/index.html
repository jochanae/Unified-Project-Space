<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinsBloom - Smart Money Management for Families</title>
    <meta name="description" content="CoinsBloom helps families manage budgets, track spending, save for goals, and teach kids financial literacy. Your complete financial wellness platform." />
    <meta name="author" content="CoinsBloom" />
    <meta name="keywords" content="budgeting app, family finance, money management, kids financial literacy, savings goals, expense tracking" />
    <link rel="canonical" href="https://coinsbloom.com" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="CoinsBloom - Smart Money Management for Families" />
    <meta property="og:description" content="Manage budgets, track spending, save for goals, and teach kids financial literacy with CoinsBloom." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://coinsbloom.com" />
    <meta property="og:image" content="https://coinsbloom.com/og-image.png" />
    <meta property="og:site_name" content="CoinsBloom" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@CoinsBloom" />
    <meta name="twitter:title" content="CoinsBloom - Smart Money Management for Families" />
    <meta name="twitter:description" content="Manage budgets, track spending, save for goals, and teach kids financial literacy." />
    <meta name="twitter:image" content="https://coinsbloom.com/og-image.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#10b981" />

    <!-- Plausible Analytics (privacy-first, no cookies) -->
    <script defer data-domain="coinsbloom.com,coinsbloom.lovable.app" src="https://plausible.io/js/script.tagged-events.outbound-links.js"></script>
    <script>
      window.plausible = window.plausible || function () { (window.plausible.q = window.plausible.q || []).push(arguments) };
    </script>

    <!-- Initial Loading Styles -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1625 0%, #1e1a2e 50%, #231c35 100%);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Brand spinner - 5 overlapping circles */
      .loader-spinner {
        position: relative;
        width: 170px;
        height: 170px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Background blur orbs */
      .loader-blur {
        position: absolute;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(147,51,234,0.5) 0%, rgba(236,72,153,0.3) 50%, transparent 70%);
        filter: blur(16px);
        animation: blurPulse 2.5s ease-in-out infinite;
      }
      .loader-blur:nth-child(1) { animation-delay: 0s; }
      .loader-blur:nth-child(2) { animation-delay: 0.3s; }
      .loader-blur:nth-child(3) { animation-delay: 0.6s; }
      .loader-blur:nth-child(4) { animation-delay: 0.9s; }
      .loader-blur:nth-child(5) { animation-delay: 1.2s; }
      
      @keyframes blurPulse {
        0% { transform: scale(0.3); opacity: 0; }
        50% { transform: scale(1.5); opacity: 0.5; }
        100% { transform: scale(2); opacity: 0; }
      }
      
      /* Main gradient circles */
      .loader-circle {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 40%, #a855f7 60%, #ec4899 100%);
        box-shadow: 0 0 30px rgba(147,51,234,0.4);
        animation: circleBloom 2.5s ease-out infinite;
      }
      .loader-circle:nth-child(6) { animation-delay: 0s; }
      .loader-circle:nth-child(7) { animation-delay: 0.3s; }
      .loader-circle:nth-child(8) { animation-delay: 0.6s; }
      .loader-circle:nth-child(9) { animation-delay: 0.9s; }
      .loader-circle:nth-child(10) { animation-delay: 1.2s; }
      
      @keyframes circleBloom {
        0% { transform: scale(0.2) rotate(0deg); opacity: 0; }
        25% { transform: scale(0.7) rotate(90deg); opacity: 0.7; }
        35% { transform: scale(1) rotate(180deg); opacity: 1; }
        65% { transform: scale(1) rotate(270deg); opacity: 1; }
        75% { transform: scale(1.1) rotate(320deg); opacity: 0.7; }
        100% { transform: scale(1.3) rotate(360deg); opacity: 0; }
      }
      
      .loader-text {
        color: rgba(255, 255, 255, 0.9);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.5px;
        animation: textFade 1.5s ease-in-out infinite;
      }
      
      @keyframes textFade {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- Initial loader shown before React loads -->
    <div id="initial-loader">
      <div class="loader-spinner">
        <!-- Background blur orbs -->
        <div class="loader-blur"></div>
        <div class="loader-blur"></div>
        <div class="loader-blur"></div>
        <div class="loader-blur"></div>
        <div class="loader-blur"></div>
        <!-- 5 overlapping gradient circles -->
        <div class="loader-circle"></div>
        <div class="loader-circle"></div>
        <div class="loader-circle"></div>
        <div class="loader-circle"></div>
        <div class="loader-circle"></div>
      </div>
      <div class="loader-text">Loading your financial journey...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loader once React is ready -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
