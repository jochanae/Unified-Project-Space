    <!-- JSON-LD: Organization + SoftwareApplication (Machine-readable Digital ID) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Into Innovations",
      "url": "https://intoiq.app",
      "logo": "https://intoiq.app/pwa-512x512.png",
      "sameAs": ["https://intoiq.lovable.app"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "IntoIQ",
      "url": "https://intoiq.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Android, iOS",
      "description": "AI-powered marketing suite combining landing pages, email marketing, CRM, social campaigns, brand voice, and analytics. Quinn AI orchestrates every channel so each tool amplifies the others.",
      "image": "https://intoiq.app/og-image.png",
      "author": { "@type": "Organization", "name": "Into Innovations", "url": "https://intoiq.app" },
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "79",
        "priceCurrency": "USD",
        "offerCount": "3"
      },
      "featureList": [
        "Quinn AI Strategic Cockpit",
        "Landing Page & Funnel Builder",
        "Email Marketing & Sequences",
        "CRM with Lead Scoring",
        "Social Campaigns & 7-Day Strategy Maps",
        "Brand Voice Cloning & Brand Vault",
        "Predictive Analytics & A/B Testing",
        "Signal Lab message + competitor audits",
        "Real-time collaboration with field locking",
        "PresentQ slide-deck integration"
      ],
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "ratingCount": "127" }
    }
    </script>
    <script>
      (function() {
        var theme = localStorage.getItem('intoiq_theme') || 'cinematic';
        document.documentElement.classList.add('theme-' + theme);
      })();
    </script>
    <meta property="og:title" content="IntoIQ — AI Marketing Suite for Modern Brands">
  <meta name="twitter:title" content="IntoIQ — AI Marketing Suite for Modern Brands">
