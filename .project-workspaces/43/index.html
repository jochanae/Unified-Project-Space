<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Habit Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #0f0f0f; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; }
    .habit-check { transition: all 0.15s ease; }
    .habit-check:active { transform: scale(0.92); }
    .nav-btn { transition: color 0.15s ease; }
    .ring-progress { transform: rotate(-90deg); }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
    .pop { animation: pop 0.2s ease; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <div id="app" class="flex flex-col h-screen max-w-sm mx-auto relative overflow-hidden">

    <!-- DASHBOARD SCREEN -->
    <div id="screen-dashboard" class="screen active flex-1 overflow-y-auto pb-20 px-5 pt-8">
      <div class="mb-6">
        <p class="text-zinc-400 text-sm">Good morning</p>
        <h1 class="text-2xl font-bold">Today</h1>
        <p id="today-date" class="text-zinc-500 text-sm mt-0.5"></p>
      </div>

      <!-- Ring summary -->
      <div class="flex items-center gap-5 bg-zinc-900 rounded-2xl p-5 mb-6">
        <div class="relative w-20 h-20 flex-shrink-0">
          <svg class="w-20 h-20 ring-progress" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#27272a" stroke-width="8"/>
            <circle id="progress-ring" cx="40" cy="40" r="34" fill="none" stroke="#a78bfa" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <span id="ring-pct" class="text-sm font-bold">0%</span>
          </div>
        </div>
        <div>
          <p class="text-zinc-400 text-sm">Completed today</p>
          <p id="summary-text" class="text-xl font-semibold mt-0.5">0 of 0</p>
          <p id="streak-text" class="text-zinc-500 text-xs mt-1">🔥 0 day streak</p>
        </div>
      </div>

      <!-- Today's habits quick-check -->
      <h2 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-3">Today's Habits</h2>
      <div id="dashboard-habit-list" class="flex flex-col gap-2">
        <p class="text-zinc-600 text-sm text-center py-6">No habits yet — add some in Habits</p>
      </div>
    </div>

    <!-- HABITS SCREEN -->
    <div id="screen-habits" class="screen flex-1 overflow-y-auto pb-20 px-5 pt-8">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Habits</h1>
        <button onclick="openAddModal()" class="bg-violet-500 hover:bg-violet-400 text-white text-sm font-semibold px-4 py-2 rounded-xl">+ Add</button>
      </div>

      <div id="habits-list" class="flex flex-col gap-3">
        <p class="text-zinc-600 text-sm text-center py-10">No habits yet. Tap + Add to create your first one.</p>
      </div>
    </div>

    <!-- PROGRESS SCREEN -->
    <div id="screen-progress" class="screen flex-1 overflow-y-auto pb-20 px-5 pt-8">
      <h1 class="text-2xl font-bold mb-6">Progress</h1>

      <div class="flex flex-col gap-4" id="progress-list">
        <p class="text-zinc-600 text-sm text-center py-10">Add some habits and check them off to see progress.</p>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-zinc-950 border-t border-zinc-800 flex justify-around items-center h-16 z-50">
      <button class="nav-btn flex flex-col items-center gap-0.5 pt-1" onclick="showScreen('dashboard')" id="nav-dashboard">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-xs">Dashboard</span>
      </button>
      <button class="nav-btn flex flex-col items-center gap-0.5 pt-1" onclick="showScreen('habits')" id="nav-habits">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        <span class="text-xs">Habits</span>
      </button>
      <button class="nav-btn flex flex-col items-center gap-0.5 pt-1" onclick="showScreen('progress')" id="nav-progress">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        <span class="text-xs">Progress</span>
      </button>
    </nav>

    <!-- ADD HABIT MODAL -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end justify-center" onclick="closeModalOutside(event)">
      <div class="bg-zinc-900 rounded-t-3xl w-full max-w-sm p-6 pb-10">
        <h2 class="text-lg font-bold mb-5">New Habit</h2>
        <div class="mb-4">
          <label class="text-sm text-zinc-400 mb-1 block">Name</label>
          <input id="habit-name-input" type="text" placeholder="e.g. Drink water, Read 20 min…"
            class="w-full bg-zinc-800 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 outline-none focus:ring-2 focus:ring-violet-500" />
        </div>
        <div class="mb-6">
          <label class="text-sm text-zinc-400 mb-2 block">Icon</label>
          <div id="emoji-picker" class="flex flex-wrap gap-2">
          </div>
        </div>
        <button onclick="saveHabit()" class="w-full bg-violet-500 hover:bg-violet-400 text-white font-semibold py-3 rounded-xl">Save Habit</button>
      </div>
    </div>

  </div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  const EMOJIS = ['💧','📚','🏃','🧘','💊','✍️','🥗','😴','🎯','💪','🌿','🎵','🧠','☀️','🚴'];
  let selectedEmoji = EMOJIS[0];

  function loadState() {
    return {
      habits: JSON.parse(localStorage.getItem('ht_habits') || '[]'),
      completions: JSON.parse(localStorage.getItem('ht_completions') || '{}'),
    };
  }

  function saveState(state) {
    localStorage.setItem('ht_habits', JSON.stringify(state.habits));
    localStorage.setItem('ht_completions', JSON.stringify(state.completions));
  }

  let state = loadState();

  // ─── Utilities ───────────────────────────────────────────────────────────────
  function todayKey() {
    return new Date().toISOString().slice(0, 10);
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function isCompleted(habitId, dateKey) {
    return !!(state.completions[dateKey] && state.completions[dateKey][habitId]);
  }

  function toggle(habitId) {
    const key = todayKey();
    if (!state.completions[key]) state.completions[key] = {};
    state.completions[key][habitId] = !state.completions[key][habitId];
    saveState(state);
    render();
  }

  function getLast7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().slice(0, 10));
    }
    return days;
  }

  function getStreak() {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().slice(0, 10);
      const dayCompletions = state.completions[key] || {};
      const anyDone = state.habits.length > 0 && state.habits.some(h => dayCompletions[h.id]);
      if (anyDone) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  // ─── Navigation ──────────────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.remove('text-violet-400');
      b.classList.add('text-zinc-500');
    });
    document.getElementById('screen-' + name).classList.add('active');
    const nb = document.getElementById('nav-' + name);
    nb.classList.remove('text-zinc-500');
    nb.classList.add('text-violet-400');
    render();
  }

  // ─── Render ──────────────────────────────────────────────────────────────────
  function render() {
    renderDashboard();
    renderHabits();
    renderProgress();
  }

  function renderDashboard() {
    document.getElementById('today-date').textContent = formatDate(new Date());
    const key = todayKey();
    const total = state.habits.length;
    const done = state.habits.filter(h => isCompleted(h.id, key)).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    const circumference = 213.6;
    const offset = circumference - (circumference * pct / 100);
    document.getElementById('progress-ring').style.strokeDashoffset = offset;
    document.getElementById('ring-pct').textContent = pct + '%';
    document.getElementById('summary-text').textContent = done + ' of ' + total;
    document.getElementById('streak-text').textContent = '🔥 ' + getStreak() + ' day streak';

    const list = document.getElementById('dashboard-habit-list');
    if (state.habits.length === 0) {
      list.innerHTML = '<p class="text-zinc-600 text-sm text-center py-6">No habits yet — add some in Habits</p>';
      return;
    }
    list.innerHTML = state.habits.map(h => {
      const checked = isCompleted(h.id, key);
      return `
        <button onclick="toggle('${h.id}')" class="habit-check flex items-center gap-3 bg-zinc-900 rounded-2xl px-4 py-3 w-full text-left">
          <span class="text-xl">${h.emoji}</span>
          <span class="flex-1 text-sm font-medium ${checked ? 'line-through text-zinc-500' : ''}">${h.name}</span>
          <span class="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${checked ? 'bg-violet-500 border-violet-500' : 'border-zinc-600'}">
            ${checked ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>' : ''}
          </span>
        </button>`;
    }).join('');
  }

  function renderHabits() {
    const list = document.getElementById('habits-list');
    if (state.habits.length === 0) {
      list.innerHTML = '<p class="text-zinc-600 text-sm text-center py-10">No habits yet. Tap + Add to create your first one.</p>';
      return;
    }
    const key = todayKey();
    list.innerHTML = state.habits.map(h => {
      const checked = isCompleted(h.id, key);
      const days = getLast7Days();
      const dots = days.map(d => {
        const c = isCompleted(h.id, d);
        return `<span class="w-2.5 h-2.5 rounded-full ${c ? 'bg-violet-500' : 'bg-zinc-700'}"></span>`;
      }).join('');
      return `
        <div class="bg-zinc-900 rounded-2xl px-4 py-4">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-xl">${h.emoji}</span>
            <span class="flex-1 font-medium text-sm">${h.name}</span>
            <button onclick="deleteHabit('${h.id}')" class="text-zinc-600 hover:text-red-400 text-xs px-2 py-1">✕</button>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="text-xs text-zinc-600 mr-1">7d</span>
            ${dots}
          </div>
        </div>`;
    }).join('');
  }

  function renderProgress() {
    const list = document.getElementById('progress-list');
    if (state.habits.length === 0) {
      list.innerHTML = '<p class="text-zinc-600 text-sm text-center py-10">Add some habits and check them off to see progress.</p>';
      return;
    }
    const days = getLast7Days();
    list.innerHTML = state.habits.map(h => {
      const completedDays = days.filter(d => isCompleted(h.id, d)).length;
      const pct = Math.round((completedDays / 7) * 100);
      const bars = days.map(d => {
        const done = isCompleted(h.id, d);
        const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 1);
        return `
          <div class="flex flex-col items-center gap-1">
            <div class="w-7 h-16 bg-zinc-800 rounded-lg overflow-hidden flex items-end">
              <div class="w-full rounded-lg transition-all duration-300 ${done ? 'bg-violet-500' : 'bg-transparent'}" style="height: ${done ? '100%' : '0%'}"></div>
            </div>
            <span class="text-xs text-zinc-600">${label}</span>
          </div>`;
      }).join('');
      return `
        <div class="bg-zinc-900 rounded-2xl px-4 py-4">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="text-lg">${h.emoji}</span>
              <span class="font-medium text-sm">${h.name}</span>
            </div>
            <span class="text-sm font-bold text-violet-400">${pct}%</span>
          </div>
          <div class="flex items-end gap-2 justify-between px-1">
            ${bars}
          </div>
          <p class="text-xs text-zinc-500 mt-3">${completedDays} of 7 days this week</p>
        </div>`;
    }).join('');
  }

  // ─── Modal ───────────────────────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('add-modal').classList.remove('hidden');
    document.getElementById('habit-name-input').value = '';
    selectedEmoji = EMOJIS[0];
    renderEmojiPicker();
    setTimeout(() => document.getElementById('habit-name-input').focus(), 100);
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('add-modal')) closeModal();
  }

  function closeModal() {
    document.getElementById('add-modal').classList.add('hidden');
  }

  function renderEmojiPicker() {
    document.getElementById('emoji-picker').innerHTML = EMOJIS.map(e =>
      `<button onclick="selectEmoji('${e}')" class="text-xl w-10 h-10 rounded-xl flex items-center justify-center ${selectedEmoji === e ? 'bg-violet-500' : 'bg-zinc-800'}">${e}</button>`
    ).join('');
  }

  function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiPicker();
  }

  function saveHabit() {
    const name = document.getElementById('habit-name-input').value.trim();
    if (!name) return;
    state.habits.push({ id: Date.now().toString(), name, emoji: selectedEmoji });
    saveState(state);
    closeModal();
    render();
  }

  function deleteHabit(id) {
    state.habits = state.habits.filter(h => h.id !== id);
    saveState(state);
    render();
  }

  // ─── Init ────────────────────────────────────────────────────────────────────
  showScreen('dashboard');
</script>
</body>
</html>
